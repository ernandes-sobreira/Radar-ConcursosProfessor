name: Atualizar Radar (diário)

on:
  schedule:
    - cron: "0 10 * * *"   # 07:00 em MT (aprox.) — ajuste se quiser
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar atualização
        run: |
          python scripts/update.py

      - name: Commit e push (se mudou)
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data/concursos.json
          git diff --cached --quiet || (git commit -m "Atualização diária do radar" && git push)
